broadcast:
  name: 广播 (Broadcast)
  description: >-
    用豆包语音合成大模型 2.0 把文本渲染成音频并在指定媒体播放器上播放。整段文本交给豆包按语义自动演绎情感；
    可选 emotion 全局语气。先离线渲染再播放，规避 HomePod/AirPlay 的流式超时。
  fields:
    message:
      name: 文本 (Message)
      description: 要播报的文本。
      required: true
      example: 早上好，今天天气晴朗，适合出门。
      selector:
        text:
          multiline: true
    media_player_entity_id:
      name: 媒体播放器 (Media player)
      description: 一个或多个目标媒体播放器实体。
      required: true
      example: media_player.master_bedroom_homepod
      selector:
        entity:
          domain: media_player
          multiple: true
    voice:
      name: 音色 (Voice)
      description: 覆盖默认音色（speaker，如 zh_female_vv_uranus_bigtts）。
      required: false
      example: zh_female_vv_uranus_bigtts
      selector:
        text:
    emotion:
      name: 语气 (Emotion)
      description: 一句自然语言语气描述，如「用温柔治愈的语气说话」。留空则由豆包按文本语义自动决定。
      required: false
      example: 用温柔治愈的语气说话
      selector:
        text:
    speech_rate:
      name: 语速 (Speech rate)
      description: 语速，-50（最慢）到 100（最快），0 为正常。
      required: false
      example: 0
      selector:
        number:
          min: -50
          max: 100
          step: 5
          mode: slider

audio_broadcast:
  name: 音频生成广播 (Audio generation broadcast)
  description: >-
    用 Doubao 音频生成 1.0 根据自然语言音频场景提示词生成完整 MP3，并在指定媒体播放器上播放。
    适合临时小剧场、提示音、轻氛围等特殊播报。生成后会保存到 /local/doubao_audio_broadcast.mp3 再播放。
  fields:
    prompt:
      name: 音频场景提示词 (Prompt)
      description: >-
        描述完整音频场景和要播报的文字。若需要提示音或背景氛围，建议明确写出时间结构和人声内容。
      required: true
      example: >-
        生成一段中文早间电台音频场景。开头两声轻柔提示音，然后低音量温暖氛围铺底，
        第3秒开始女声播报：早上好，主人。
      selector:
        text:
          multiline: true
    media_player_entity_id:
      name: 媒体播放器 (Media player)
      description: 一个或多个目标媒体播放器实体。
      required: true
      example: media_player.master_bedroom_homepod
      selector:
        entity:
          domain: media_player
          multiple: true
    fallback_message:
      name: 回退文本 (Fallback message)
      description: 音频生成失败时，使用普通 TTS 2.0 播放的文本。留空则失败时只写日志。
      required: false
      example: 早上好，今天多云，适合出门。
      selector:
        text:
          multiline: true
    voice:
      name: 回退音色 (Fallback voice)
      description: 回退到普通 TTS 时使用的音色。
      required: false
      example: zh_female_vv_uranus_bigtts
      selector:
        text:
    emotion:
      name: 回退语气 (Fallback emotion)
      description: 回退到普通 TTS 时使用的语气描述。
      required: false
      example: 用温暖明亮、有活力的语气说话
      selector:
        text:
    speech_rate:
      name: 语速 (Speech rate)
      description: 语速，-50（0.5x）到 100（2x），0 为正常。
      required: false
      default: 0
      selector:
        number:
          min: -50
          max: 100
          step: 5
          mode: slider
    pitch_rate:
      name: 音高 (Pitch rate)
      description: 音高，-12 到 12，0 为正常。
      required: false
      default: 0
      selector:
        number:
          min: -12
          max: 12
          step: 1
          mode: slider
    loudness_rate:
      name: 响度 (Loudness rate)
      description: 响度，-50 到 100，0 为正常。
      required: false
      default: 0
      selector:
        number:
          min: -50
          max: 100
          step: 5
          mode: slider
